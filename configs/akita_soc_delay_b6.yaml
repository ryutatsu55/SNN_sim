simulation:
  N: 100
  dt: 0.1
  seed: 1

inputs:
  GaussianNoise:
    enable: false
    mean: 0.0
    sd: 0.0

neurons:
  Layer_Exc:
    type: akita_escape_lif
    mode: excitatory_b6
    num: 80
  Layer_Inh:
    type: akita_escape_lif
    mode: inhibitory_b6
    num: 20

synapses:
  from_Exc:
    source: Layer_Exc
    delay_by_target:
      Layer_Exc: 1.5
      Layer_Inh: 0.8
    plasticity:
      type: custom_Akita
      mode: e-stdp_delay_trace
    synapse:
      type: ExpCond
      mode: excitatory
  from_Inh:
    source: Layer_Inh
    delay_by_target:
      Layer_Exc: 0.8
      Layer_Inh: 0.8
    plasticity:
      type: custom_Akita
      mode: i-stdp_delay_trace
    synapse:
      type: ExpCond
      mode: inhibitory

network:
  space: no_space
  connection: constant_prob_full
  weight: constant_zero
  delay: constant
