pqn_test:
  input: 0.00         # [nA]
  input_type: "step"  # (step or continuous)
  duration: 10000.0    # [ms]
  graph_name: "PQN_V_test"

akita_soc_fig2:
  duration: 259200000.0  # 72 h [ms]
  record_hours: [0, 6, 72]
  record_window_ms: 600000.0  # 10 min
  record_buffer_ms: 10000.0
  graph_name: "akita_soc_fig2"

akita_soc_fig2_stable_probe:
  duration: 259200000.0  # 72 h [ms]
  record_hours: [0, 1, 3, 6, 12, 24, 48, 72]
  record_window_ms: 600000.0  # 10 min
  record_buffer_ms: 10000.0
  graph_name: "akita_soc_fig2_stable_probe"
    
beggs_plenz_avalanche:
  # Beggs & Plenz (2003) 神経アバランシェ再現。
  # akita_soc_fig2 の 72h プロトコルは N=40000 では実行時間 3〜7 日になるため 12h へ短縮。
  # 12h では STDP の長期発達は飽和しない前提で、アバランシェ統計の評価を主目的とする。
  duration: 43200000.0        # 12 h [ms]
  record_hours: [0, 1, 6, 12]
  record_window_ms: 600000.0  # 10 min
  record_buffer_ms: 10000.0
  graph_name: "beggs_plenz_avalanche"

beggs_plenz_smoke:
  # 縮小 config でのスモーク実行用 (スクリプト・解析・可視化の疎通確認)。
  duration: 120000.0          # 2 min [ms]
  record_hours: [0, 0.0166667]  # 0 s と 60 s (= 1/60 h)
  record_window_ms: 30000.0   # 30 s
  record_buffer_ms: 5000.0
  graph_name: "beggs_plenz_smoke"

lif_test:
  duration: 10000.0
  input: -49.0
  devide: 5
  tgt_ID: 1

stdp_test:
  duration: 150.0
  input: -49.0    # lifの膜電位を想定
  dt_max: 100
  dt_min: -100
  ddt: 2

spatial_recognition:
  duration: 10000.0
  input:
    type: "spatial"
    strength: 0.5
    duration_stim: 0.1
    input_nodes: 30
  output:
    teaching_duration: 2.5
    readout_nodes: 60
  experiment:
    n_train: 20
    n_test: 10

voice_recognition:
  name: "voice_recognition"
  input:
    type: "cochleagram"
    input_dt: 0.008        # 旧 INPUT_DT_COCH
    input_nodes: 17
  output:
    teaching_duration: 2.5
    readout_nodes: 60
  experiment:
    duration_interval: 10.0 # 旧 DURATION_INTERVAL_COCH
    n_train: 14  
    n_test: 6

spatio_temporal:
  name: "spatio_temporal"
  input:
    type: "spatio_temp"
    strength: 0.5
    duration_stim: 0.1
    input_dt: 0.01         # 旧 SPATIO_TEMP_DT
    input_nodes: 30
  output:
    teaching_duration: 2.5
    readout_nodes: 60
  experiment:
    duration_interval: 10.0
    n_train: 20
    n_test: 10

real_time_control:
  name: "real_time_control"
  input:
    type: "real_time"
    strength: 0.5
    duration_stim: 0.1
    input_dt: 0.01   
  output:
    teaching_duration: 2.5
    readout_nodes: 60
  experiment:
    duration_interval: 10.0
    n_train: 20
    n_test: 10  
  realtime:
    io_interval: 0.005 # 5ms周期
