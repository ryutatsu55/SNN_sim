
constant_prob:
  num_modules: 4
  e_rate: 0.75
  p_in: 0.1
  p_out: 0.05

distance_based_grid:
  type: "distance"
  e_rate: 0.75
  lambda_decay: 0.1    

sparse_sphere:
  type: "random"
  e_rate: 0.75
  probability: 0.1

module_based:
  type: "module"
  num_modules: 4
  within_module_connection_prob: 0.1
  between_module_connection_prob: 0.01
  allow_self_connections: true
