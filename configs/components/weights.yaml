constant:
  base_weight: 1.5    # 興奮性の基本重み (RESERVOIR_CONN)

constant_zero:
  base_weight: 0.0

normal_broad:
  mean: 0.9
  std: 0.2
  
lognormal_broad:
  mean: 0.5
  std: 0.02

# Beggs & Plenz (2003) 再現用の初期重み (docs/refs/SNN_PA~1.MD §10)。
# 28 DIV 成熟培養網を模し、ゼロ初期を避けて対数正規から開始し [w_min, w_max] へ切り捨てる。
# custom_Akita の重み w は正規化 [0, Wmax=1.0] 空間なので w_max=Wmax に合わせる。
beggs_plenz:
  mu_ln: -0.857    # = ln(0.7) - sigma_ln^2/2 (平均 ~0.7 EPSP; Song 2005 / Lefort 2009, J Neurosci/Neuron)
  sigma_ln: 1.0    # 分布の広がり (MD §10: 0.8〜1.2)
  w_min: 0.0       # 下限 (MD §7 Wmin)
  w_max: 1.0       # 上限 = custom_Akita Wmax ハードバウンド (MD §7/§10)

offset_scaled_normal:
  offset: 1.0
  g_scale: 0.5

distance_dependent:
  max_weight: 1.0
  decay_length: 2.0   # 距離減衰の長さ[um] (距離がこの値のとき、重みが約0.37倍になる)

"C.elegans":
  # コネクトーム実重み。sources で chem/elec/both を選択、both は priority で優先側を指定。
  sources: chem        # chem | elec | both
  priority: elec       # both のとき両方接続がある要素で優先する側 (chem | elec)
  min_weight: 0.0
  max_weight: 30.0
  normalize: true      # true: クリップ後 max_weight で正規化(上限→1.0) / false: 生値のまま
