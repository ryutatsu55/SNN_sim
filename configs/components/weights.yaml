constant:
  base_weight: 1.5    # 興奮性の基本重み (RESERVOIR_CONN)

constant_zero:
  base_weight: 0.0

normal_broad:
  mean: 0.9
  std: 0.2
  
lognormal_broad:
  # (LogNormalRandomWeight)。シナプス強度の対数正規性は Song 2005 / Lefort 2009 が報告。
  mean: 0.5        # 物理的意味を持たない。コンダクタンス等含めてPSPが計算されて初めて意味を持つ
  sigma_ln: 1.0    # 下地正規分布の広がり (Song 2005 相当: 0.8〜1.2)
  w_min: 0.0       # クリップ下限 (任意。省略でクリップ無し)
  w_max: 1.0       # クリップ上限 (任意。省略でクリップ無し。custom_Akita Wmax ハードバウンドに一致)

offset_scaled_normal:
  offset: 1.0
  g_scale: 0.5

distance_dependent:
  max_weight: 1.0
  decay_length: 2.0   # 距離減衰の長さ[um] (距離がこの値のとき、重みが約0.37倍になる)

"C.elegans":
  # コネクトーム実重み。sources で chem/elec/both を選択、both は priority で優先側を指定。
  sources: chem        # chem | elec | both
  priority: elec       # both のとき両方接続がある要素で優先する側 (chem | elec)
  min_weight: 0.0
  max_weight: 30.0
  normalize: true      # true: クリップ後 max_weight で正規化(上限→1.0) / false: 生値のまま
