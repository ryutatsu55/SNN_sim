# =================================================================
# Post-Synaptic Mechanism Configurations
# =================================================================

# 1. ExpCond (Conductance-based Exponential Synapse)
# standard_models.py の ExpCond クラスに対応
ExpCond:
  excitatory:
    tau: 2.0        # [ms] 減衰時定数
    E: 0.0          # [mV] 反転電位 (※コード内のself.config.Eに準拠)
  inhibitory:
    tau: 4.0        # [ms]
    E: -80.0        # [mV]

# 1b. ExpCondGClip / ExpCondGCap (g_max 飽和つき conductance-based 指数シナプス)
# custom.py の ExpCondGClip / ExpCondGCap クラスに対応。
# g_max は「後ニューロン 1 個に集まる総コンダクタンス g_total の上限」。
# plasticity.yaml の g_max と同値にするが、設計をシンプルに保つためここで独立に与える。
#   ExpCondGClip : g_total を [0, g_max] に破壊的にクランプしてから計算 (状態も頭打ち)
#   ExpCondGCap  : g_total は素のまま減衰、計算にのみ min(g_total, g_max) を使う
ExpCondGClip:
  excitatory:
    tau: 2.0        # [ms]
    E: 0.0          # [mV]
    g_max: 4.0      # [uS] 総コンダクタンス上限
  inhibitory:
    tau: 4.0        # [ms]
    E: -80.0        # [mV]
    g_max: 4.0      # [uS]

ExpCondGCap:
  excitatory:
    tau: 2.0        # [ms]
    E: 0.0          # [mV]
    g_max: 4.0      # [uS]
  inhibitory:
    tau: 4.0        # [ms]
    E: -80.0        # [mV]
    g_max: 4.0      # [uS]

# 2. ExpCurr (Current-based Exponential Synapse)
# standard_models.py の ExpCurrSynapse クラスに対応
ExpCurr:
  excitatory:
    tau: 2.0        # [ms] 減衰時定数
  inhibitory:
    tau: 5.0        # [ms]

# 3. custom_example (Custom Post-Synaptic Model)
# custom.py の CustomSynapseExample クラスに対応
custom_example:
  default:
    tau_decay: 10.0 # [ms] (※コード内のself.config.tau_decayに準拠)
  fast:
    tau_decay: 2.0  # [ms]


