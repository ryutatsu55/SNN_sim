# 【軸索遅延(axonal delay)による高速化について】
# trace_algorithm: delay_corrected は本来、毎ステップ実行の synapse_dynamics_code で
# 到着時刻STDPを実現する(全シナプス×全ステップ = 低速)。ただしシナプス集団の遅延が
# delay_by_target で「均一」指定されている場合、NetworkBuilder は自動的に GeNN の
# axonal_delay_steps 経路へ切替える: pre_spike_syn_code を到着時刻にイベント駆動で実行し、
# STDP は legacy と同じ数式(st_pre が到着時刻へ自動補正されるため遅延補正済み)で直接計算、
# syn_dynamics_code を撤廃して大幅に高速化する。電流は addToPostDelay ではなく addToPost。
# → delay_corrected 指定でも delay_by_target があれば実体は axonal(legacy数式)になる。
# distance_based / random 等の集団内不均一遅延では従来の dendritic + syn_dynamics 経路のまま。
custom_Akita:
  e-stdp:
    tau_rec: 150.0  # [ms]
    U: 0.4           
    g_max: 4.0      # [uS]
    normalize_gmax_by_fan_in: false
    A_E: 0.02
    tau_E: 20.0
    beta_E: 1.00
    Wmin: 0.0
    Wmax: 1.0
  e-stdp_scaled:
    tau_rec: 150.0  # [ms]
    U: 0.4           
    g_max: 4.0      # [uS]
    normalize_gmax_by_fan_in: true
    A_E: 0.02
    tau_E: 20.0
    beta_E: 1.00
    Wmin: 0.0
    Wmax: 1.0
  e-stdp_delay_trace:
    tau_rec: 150.0
    U: 0.4
    g_max: 4.0
    normalize_gmax_by_fan_in: false
    A_E: 0.02
    tau_E: 20.0
    beta_E: 1.00
    Wmin: 0.0
    Wmax: 1.0
    trace_algorithm: delay_corrected
  # 論文Fig S4 の頑健な臨界設定 (beta_E=1.10): E-STDPに弱い抑圧バイアス(復元力)を入れEE飽和ドリフトを抑える
  e-stdp_b110_delay_trace:
    tau_rec: 150.0
    U: 0.4
    g_max: 4.0
    normalize_gmax_by_fan_in: false
    A_E: 0.02
    tau_E: 20.0
    beta_E: 1.10
    Wmin: 0.0
    Wmax: 1.0
    trace_algorithm: delay_corrected
  # A_E=0.01 検証用 (実効学習率半分仮説): βE=1.10
  e-stdp_b110_a01_delay_trace:
    tau_rec: 150.0
    U: 0.4
    g_max: 4.0
    normalize_gmax_by_fan_in: false
    A_E: 0.01
    tau_E: 20.0
    beta_E: 1.10
    Wmin: 0.0
    Wmax: 1.0
    trace_algorithm: delay_corrected
  # A_E=0.01 + βE=1.00 (Fig2条件で実効学習率半分)
  e-stdp_a01_delay_trace:
    tau_rec: 150.0
    U: 0.4
    g_max: 4.0
    normalize_gmax_by_fan_in: false
    A_E: 0.01
    tau_E: 20.0
    beta_E: 1.00
    Wmin: 0.0
    Wmax: 1.0
    trace_algorithm: delay_corrected
  # 統一仮説の検証: 興奮性に弱い復元力(βE=1.05, ∫F_E<0)。βI=1.15据え置き
  e-stdp_b105_delay_trace:
    tau_rec: 150.0
    U: 0.4
    g_max: 4.0
    normalize_gmax_by_fan_in: false
    A_E: 0.02
    tau_E: 20.0
    beta_E: 1.05
    Wmin: 0.0
    Wmax: 1.0
    trace_algorithm: delay_corrected
  e-stdp_scaled_delay_trace:
    tau_rec: 150.0
    U: 0.4
    g_max: 4.0
    normalize_gmax_by_fan_in: true
    A_E: 0.02
    tau_E: 20.0
    beta_E: 1.00
    Wmin: 0.0
    Wmax: 1.0
    trace_algorithm: delay_corrected
  e-stdp_trace:
    tau_rec: 150.0
