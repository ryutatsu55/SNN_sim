no_space:
  hoge: null

grid_2d:
  x_range: [0.0, 100.0]  # um
  y_range: [0.0, 100.0]  # um

random_2d:
  x_range: [0.0, 1500.0]  # um
  y_range: [0.0, 1500.0]  # um

# Beggs&Plenz 検証ラダー用の縮小空間。結合の出次数は N ではなく「面積密度」で決まるため、
# N を減らすときは面積も同率で縮めないと結合度が崩れて臨界現象が別物になる。
# 基準密度 = 40000 / 1500^2 = 0.017778 neurons/um^2 を全プロファイルで一定に保つ。
random_2d_n1000:
  x_range: [0.0, 237.2]   # um  (N=1000)
  y_range: [0.0, 237.2]   # um

random_2d_n4000:
  x_range: [0.0, 474.3]   # um  (N=4000)
  y_range: [0.0, 474.3]   # um

random_2d_n10000:
  x_range: [0.0, 750.0]   # um  (N=10000)
  y_range: [0.0, 750.0]   # um

block_2d:
  x_range: [0.0, 100.0]  # um
  y_range: [0.0, 100.0]  # um
  num_modules: 4
  margin: 0.3

"C.elegans":
  # C_elegansSpace は ordered_coords.csv から実3D座標と Layer(IN1..IN4) を読む。
  # 層構造と assignment=random は describe_layout() が供給するためパラメータは不要。
  source: ordered_coords.csv