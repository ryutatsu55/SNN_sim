# akita_soc.yaml の dc(per-synapse遅延=syn_dynamics)版。
# delay_by_target を外すことで nearest-dc 経路 (毎ステップ syn_dynamics) になる。
simulation:
  N: 100
  dt: 0.1
  seed: 1

inputs:
  GaussianNoise:
    enable: false
    mean: 0.0
    sd: 0.0

neurons:
  Layer_Exc:
    type: akita_escape_lif
    mode: excitatory
    num: 80
  Layer_Inh:
    type: akita_escape_lif
    mode: inhibitory
    num: 20

synapses:
  from_Exc:
    source: Layer_Exc
    plasticity:
      type: custom_Akita
      mode: e-stdp
    synapse:
      type: ExpCond
      mode: excitatory
  from_Inh:
    source: Layer_Inh
    plasticity:
      type: custom_Akita
      mode: i-stdp
    synapse:
      type: ExpCond
      mode: inhibitory

network:
  space: no_space
  connection: constant_prob_full
  weight: constant_zero
  delay: constant
