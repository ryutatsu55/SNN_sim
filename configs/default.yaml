base:
  seed: 100
  dt: 0.0001
  precision: "float"

network:
  total_n: 60
  module_count: 4

  profiles:
    neuron_model: "PQN_default"
    topology: "modular_random"                  # 誰と誰を繋ぐか
    weight: "constant_default"                  # 初期重みの強さ
    delay: "empirical"                          # 伝播遅延
    synapse: "tsodyks_doubleExponential"        # 短期可塑性 (STP)
    plasticity: "static"                        # [新規] 長期可塑性 (STDP等)