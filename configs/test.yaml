simulation:
  N: 150
  dt: 0.1             # 時間ステップ (ms)
  seed: null         # 乱数シード

inputs:
  GaussianNoise:
    enable: false
    mean: 10.0      # [nA] 
    sd: 1.0        # [nA]

neurons:
  Layer_Exc:
    type: PQN_float
    mode: RSexci
    num: 80
  Layer_Inh:
    type: PQN_int
    mode: RSinhi
    num: 20

synapses:
  Exc_to_Inh:
    source: Layer_Exc
    target: Layer_Inh
    weight_scale: 1.0
    synapse:
      type: tsodyks_markram
      mode: facilitate
    plasticity: 
      type: static
      mode: null
  Inh_to_Exc:
    source: Layer_Inh
    target: Layer_Exc
    weight_scale: 4.0
    synapse:
      type: tsodyks_markram
      mode: depress
    plasticity: 
      type: static
      mode: null

network:
  space: block_2d
  connection: distance_based
  weight: distance_dependent
  delay: distance_based 
