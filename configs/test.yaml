simulation:
  N: 150
  dt: 0.1             # 時間ステップ (ms)
  seed: null         # 乱数シード

inputs:
  GaussianNoise:
    enable: false
    mean: 10.0      # [nA] 
    sd: 1.0        # [nA]

neurons:
  Layer_Exc:
    type: akita_escape_lif
    mode: excitatory
    num: 80
  Layer_Inh:
    type: akita_escape_lif
    mode: inhibitory
    num: 20

synapses:
  from_Exc:
    source: Layer_Exc
    plasticity: 
      type: custom_Akita
      mode: e-stdp
      pairing: nearest
    synapse:
      type: ExpCond
      mode: excitatory
  from_Inh:
    source: Layer_Inh
    plasticity: 
      type: custom_Akita
      mode: i-stdp
      pairing: nearest
    synapse:
      type: ExpCond
      mode: inhibitory

network:
  space: block_2d
  connection: distance_based
  weight: lognormal_broad
  delay: distance_based 
