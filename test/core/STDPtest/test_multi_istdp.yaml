# 複数スパイクに対する custom_Akita (e-stdp_trace) の重み更新検証用 config
# test/core/STDPtest/test_multi_spike.py 専用 (load_resolved で読み込む resolved 形式)
#
# 重要な調整点 (test.yaml との差分):
#   - plasticity.g_max: 0.0   -> EPSP 伝播を無効化し、スパイクのタイミングを完全に制御する
#                                (STDP 更新は A_E/beta_E を直接使うため g_max=0 でも機能する)
#   - weight.base_weight: 0.5 -> [Wmin, Wmax]=[0,1] の中央。dw がクランプしないよう余裕を確保
simulation:
  dt: 0.1
  N: 2
  seed: null
inputs:
  GaussianNoise:
    enable: false
    mean: 10.0
    sd: 1.0
neurons:
  Layer_Inh:
    type: test_LIF
    mode: inhibitory
    num: 2
    C: 1.0
    TauM: 20.0
    Vrest: -60.0
    Vthresh: -50.0
    Vreset: -65.0
    Ioffset: 0.0
    TauRefrac: 5.0
synapses:
  from_Inh:
    source: Layer_Inh
    synapse:
      type: ExpCond
      mode: inhibitory
      tau: 2.0
      E: -80.0
    plasticity:
      type: custom_Akita
      mode: i-stdp_trace
      trace_algorithm: delay_corrected
      tau_rec: 150.0
      U: 0.4
      g_max: 0.0
      normalize_gmax_by_fan_in: true
      A_I: 0.02
      tau_I1: 10.0
      tau_I2: 20.0
      beta_I: 1.12
      Wmin: 0.0
      Wmax: 1.0
    delay_by_target:
      Layer_Inh: 0.8
network:
  space:
    profile_name: block_2d
    x_range:
    - 0.0
    - 10.0
    y_range:
    - 0.0
    - 10.0
    num_modules: 1
    margin: 0.6
  connection:
    profile_name: optional_connect
    src_ID: 1
    tgt_ID: 0
  weight:
    profile_name: constant
    base_weight: 0.5
  delay:
    profile_name: constant
    value: 2.0
task:
  profile_name: stdp_multi_test
  duration: 120.0
  input: -49.0
meta:
  timestamp: 2026-06-05_00-00-00
