simulation:
  dt: 0.1
  N: 150
  seed: null
inputs:
  GaussianNoise:
    enable: false
    mean: 10.0
    sd: 1.0
neurons:
  Layer_Exc:
    type: test_LIF
    mode: excitatory
    num: 2
    C: 1.0
    TauM: 20.0
    Vrest: -60.0
    Vthresh: -50.0
    Vreset: -65.0
    Ioffset: 0.0
    TauRefrac: 5.0
synapses:
  from_Exc:
    source: Layer_Exc
    synapse:
      type: ExpCond
      mode: excitatory
      tau: 2.0
      E: 0.0
    plasticity:
      type: custom_Akita
      mode: e-stdp
      tau_rec: 150.0  # [ms]
      U: 0.4           
      g_max: 4.0      # [uS]
      A_E: 0.02
      tau_E: 20.0
      beta_E: 1.12
      Wmin: 0.0
      Wmax: 1.0
