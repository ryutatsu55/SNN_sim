# 複数スパイクに対する custom_Akita (e-stdp_trace) の重み更新検証用 config
# test/core/STDPtest/test_multi_spike.py 専用 (load_resolved で読み込む resolved 形式)
#
# 重要な調整点 (test.yaml との差分):
#   - plasticity.g_max: 0.0   -> EPSP 伝播を無効化し、スパイクのタイミングを完全に制御する
#                                (STDP 更新は A_E/beta_E を直接使うため g_max=0 でも機能する)
#   - weight.base_weight: 0.5 -> [Wmin, Wmax]=[0,1] の中央。dw がクランプしないよう余裕を確保
simulation:
  dt: 0.1
  N: 150
  seed: null
inputs:
  GaussianNoise:
    enable: false
    mean: 10.0
    sd: 1.0
neurons:
  Layer_Exc:
    type: test_LIF
    mode: excitatory
    num: 2
    C: 1.0
    TauM: 20.0
    Vrest: -60.0
    Vthresh: -50.0
    Vreset: -65.0
    Ioffset: 0.0
    TauRefrac: 5.0
synapses:
  from_Exc:
    source: Layer_Exc
    synapse:
      type: ExpCond
      mode: excitatory
      tau: 2.0
      E: 0.0
    plasticity:
      type: custom_Akita
      mode: e-stdp_trace
      tau_rec: 150.0  # [ms]
      U: 0.4
      g_max: 0.0      # [uS] EPSP伝播を無効化 (発火タイミングを完全制御)
      A_E: 0.02
      tau_E: 20.0
      beta_E: 1.12
      Wmin: 0.0
      Wmax: 1.0
