network:
  space:
    profile_name: block_2d
    x_range:
    - 0.0
    - 10.0
    y_range:
    - 0.0
    - 10.0
    num_modules: 1
    margin: 0.6
  connection:
    profile_name: optional_connect
    src_ID: 1
    tgt_ID: 0
  weight:
    profile_name: constant
    base_weight: 0.5
  delay:
    profile_name: constant
    value: 1.5
task:
  profile_name: stdp_multi_test
  duration: 120.0
  input: -49.0
meta:
  timestamp: 2026-06-05_00-00-00
